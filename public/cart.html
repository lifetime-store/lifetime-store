<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart — Lifetime</title>
  <meta name="description" content="Lifetime quiet premium essentials with item verification and long-term quality.">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="/" class="brand">
        <span class="brand-mark">LT</span>
        <span class="brand-copy">
          LIFETIME
          <small>Quiet premium essentials</small>
        </span>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/shop.html">Shop</a>
        <a href="/verify.html">Verify</a>
        <a href="/about.html">About</a>
        <a href="/support.html">Support</a>
        <a href="/admin.html">Admin</a>
      </nav>
      <div class="nav-actions">
        <a class="badge" href="/cart.html">Cart <span data-cart-count>0</span></a>
      </div>
    </div>
  </header>
  
<main class="section">
  <div class="container split-grid">
    <section class="panel">
      <div class="eyebrow">Cart</div>
      <h1 style="font-size: clamp(2rem, 5vw, 4rem);">Your selection</h1>
      <div data-cart-items class="stack"></div>
    </section>
    <aside class="panel">
      <div class="eyebrow">Summary</div>
      <h3>Subtotal</h3>
      <div class="price-main" data-cart-total>₦0</div>
      <div class="inline-actions" style="margin-top: 1rem;">
        <a class="btn btn-primary" href="/checkout.html">Proceed to checkout</a>
        <button class="btn btn-soft" type="button" data-clear-cart>Clear cart</button>
      </div>
    </aside>
  </div>
</main>

  <footer class="footer">
    <div class="container footer-grid">
      <div class="footer-brand">
        <strong>LIFETIME</strong>
        <small>Quiet quality. Everyday wear. Verified originals.</small>
      </div>
      <nav class="footer-links">
        <a href="/shop.html">Shop</a>
        <a href="/verify.html">Verify</a>
        <a href="/support.html">Support</a>
        <a href="/about.html">About</a>
      </nav>
    </div>
  </footer>
  <script type="module" src="/assets/js/api.js"></script>
  <script type="module" src="/assets/js/cart.js"></script>
</body>
</html>
